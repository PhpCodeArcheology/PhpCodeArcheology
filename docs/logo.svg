<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Outer circle container -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#0e7490" stroke-width="2.5"/>

  <!-- Edges: top to bottom-left, top to bottom-right -->
  <line x1="28" y1="14.5" x2="16" y2="43" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="28" y1="14.5" x2="52" y2="38" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Bottom edge: subtle/thinner — the "discovered" connection -->
  <line x1="16" y1="43" x2="52" y2="38" stroke="#0e7490" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="3 3"/>

  <!-- Top node (largest, brightest) -->
  <circle cx="28" cy="14.5" r="7" fill="#22d3ee"/>

  <!-- Bottom-left node (medium) -->
  <circle cx="16" cy="43" r="5.5" fill="#06b6d4"/>

  <!-- Bottom-right node (smallest, darkest) -->
  <circle cx="52" cy="38" r="4" fill="#0e7490"/>
</svg>
